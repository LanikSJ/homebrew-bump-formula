name: "🐛 Bug Report"
description: Create a new ticket for a bug.
title: "🐛 [BUG] - <title>"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "🐛 Bug Report"
      description: "A clear and concise description of what the bug is."
      placeholder: "Describe the bug"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the behavior"
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "A clear and concise description of what you expected to happen."
      placeholder: "What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "A clear and concise description of what actually happened."
      placeholder: "What actually happened?"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: "Paste the relevant log output here, if applicable."
      render: shell
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "How has this issue affected you? What are you trying to accomplish? Providing context helps us come up with a solution that is most useful in the real world."
      placeholder: "Please provide any additional context."
    validations:
      required: false
  - type: dropdown
    id: version
    attributes:
      label: "Version"
      description: "What version are you using?"
      options:
        - 1.0.0
        - 0.9.0
        - 0.8.0
        - 0.7.0
        - 0.6.0
        - 0.5.0
        - 0.4.0
        - 0.3.0
        - 0.2.0
        - 0.1.0
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      description: "What operating system are you using?"
      options:
        - Windows
        - Linux
        - Mac
    validations:
      required: false
