name: Test Action

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: test
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  TAP: ${{ github.repository }}
  TAP_URL: ${{ github.server_url }}/${{ github.repository }}

jobs:
  # Test individual formula updates with specific tags/versions
  test-formula-updates:
    name: Test Formula Updates
    strategy:
      matrix:
        test:
          - { formula: "test-formula-url", tag: "v7" }
          - {
              formula: "test-formula-git-revision",
              tag: "v0.8.3",
              revision: "ecea0ce570d18808399ee16515e30a955707eaa8",
            }
          - { formula: "test-formula-pypi-url", tag: "4.13.9" }
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test Formula Bump
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user_name: ${{ github.actor }}
          user_email: ${{ github.actor }}@users.noreply.github.com
          tap: ${{ env.TAP }}
          tap_url: ${{ env.TAP_URL }}
          formula: ${{ matrix.test.formula }}
          tag: ${{ matrix.test.tag }}
          revision: ${{ matrix.test.revision }}
          no_fork: true
          force: true

  # Test livecheck functionality for individual formulas
  test-livecheck-formulas:
    name: Test Livecheck (Formulas)
    runs-on: macos-latest
    needs: [ test-formula-updates ]
    steps:
      - name: Wait for Previous Job
        run: sleep 30

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test Livecheck for Multiple Formulas
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user_name: ${{ github.actor }}
          user_email: ${{ github.actor }}@users.noreply.github.com
          message: test
          formula: |
            test-formula-url
            test-formula-git-revision
            test-formula-pypi-url
          tap: ${{ env.TAP }}
          tap_url: ${{ env.TAP_URL }}
          livecheck: true
          no_fork: true
          force: true

  # Test livecheck functionality for entire tap
  test-livecheck-tap:
    name: Test Livecheck (Tap)
    runs-on: ubuntu-latest
    needs: [ test-livecheck-formulas ]
    steps:
      - name: Wait for Previous Job
        run: sleep 30

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test Livecheck for Entire Tap
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user_name: ${{ github.actor }}
          user_email: ${{ github.actor }}@users.noreply.github.com
          message: |
            First line
            SECOND LINE
          tap: ${{ env.TAP }}
          tap_url: ${{ env.TAP_URL }}
          livecheck: true
          no_fork: true
          force: true
