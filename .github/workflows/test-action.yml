name: Test Action

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test
  cancel-in-progress: false

env:
  HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
  HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
  TAP: ${{ github.repository }}
  TAP_URL: ${{ github.server_url }}/${{ github.repository }}

jobs:
  # Validate that required secrets are available
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    outputs:
      token-valid: ${{ steps.validate.outputs.token-valid }}
    steps:
      - name: Validate HOMEBREW_TOKEN secret
        id: validate
        run: |
          if [ -z "${{ secrets.HOMEBREW_TOKEN }}" ]; then
            echo "❌ HOMEBREW_TOKEN secret is not set in repository settings"
            echo "Please add the HOMEBREW_TOKEN secret to your repository:"
            echo "1. Go to repository Settings > Secrets and variables > Actions"
            echo "2. Click 'New repository secret'"
            echo "3. Add 'HOMEBREW_TOKEN' with your GitHub Personal Access Token"
            exit 1
          else
            echo "✅ HOMEBREW_TOKEN secret is available"
            echo "token-valid=true" >> $GITHUB_OUTPUT
          fi

  # Test individual formula updates with specific tags/versions
  test-formula-updates:
    name: Test Formula Updates
    strategy:
      matrix:
        test:
          - { formula: "test-formula-url", tag: "v0.1.12" }
          - { formula: "test-formula-git-revision", tag: "v0.3.3", revision: "c43abd765cf51c06bbcaa5479dc49aab1396989f" }
          - { formula: "test-formula-pypi-url", tag: "v2.42.0" }
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test formula bump
        uses: ./
        with:
          token: ${{ env.HOMEBREW_TOKEN }}
          tap: ${{ env.TAP }}
          tap_url: ${{ env.TAP_URL }}
          formula: ${{ matrix.test.formula }}
          tag: ${{ matrix.test.tag }}
          revision: ${{ matrix.test.revision }}
          force: true

  # Test livecheck functionality for individual formulas
  test-livecheck-formulas:
    name: Test Livecheck (Formulas)
    runs-on: macos-latest
    needs: test-formula-updates
    steps:
      - name: Wait for previous job
        run: sleep 30

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test livecheck for multiple formulas
        uses: ./
        with:
          token: ${{ env.HOMEBREW_TOKEN }}
          message: test
          formula: |
            test-formula-url
            test-formula-git-revision
            test-formula-pypi-url
          tap: ${{ env.TAP }}
          tap_url: ${{ env.TAP_URL }}
          livecheck: true
          force: true

  # Test livecheck functionality for entire tap
  test-livecheck-tap:
    name: Test Livecheck (Tap)
    runs-on: ubuntu-latest
    needs: test-livecheck-formulas
    steps:
      - name: Wait for previous job
        run: sleep 30

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test livecheck for entire tap
        uses: ./
        with:
          token: ${{ env.HOMEBREW_TOKEN }}
          message: |
            First line
            SECOND LINE
          tap: ${{ env.TAP }}
          tap_url: ${{ env.TAP_URL }}
          livecheck: true
          force: true